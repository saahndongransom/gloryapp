{% extends 'lms/lms_base.html' %}
{% block title %}Reset Password | GloryLMS{% endblock %}
{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin: 20px; }
.logo { width: 48px; height: 48px; background: #1a56db; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.logo i { color: #fff; font-size: 20px; }
h2 { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 8px; }
p { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 24px; line-height: 1.6; }
label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; margin-bottom: 16px; }
input:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,.1); }
button { width: 100%; background: #1a56db; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
a { color: #1a56db; font-size: 13px; text-decoration: none; display: block; text-align: center; margin-top: 16px; }
</style>
{% endblock %}
{% block content %}
<div class="card">
  <div class="logo"><i class="fas fa-layer-group"></i></div>
  <h2>Reset Your Password</h2>
  <p>Enter your email address and we'll send you a link to reset your password.</p>
  <form method="POST">
    {% csrf_token %}
    <label>Email Address</label>
    <input type="email" name="email" placeholder="your@email.com" required autofocus>
    <button type="submit">Send Reset Link</button>
  </form>
  <a href="{% url 'lms_login' %}">← Back to Login</a>
</div>
{% endblock %}
