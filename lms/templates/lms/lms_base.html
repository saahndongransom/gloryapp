{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}GloryLMS{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% block extra_css %}{% endblock %}
<style>
/* ── Dark mode ── */
body.dark-mode {
  --bg: #0f172a;
  --surface: #1e293b;
  --border: rgba(255,255,255,0.08);
  --text: #f1f5f9;
  --muted: #94a3b8;
}
body.dark-mode .topbar { background: #1e293b; }
body.dark-mode .panel { background: #1e293b; }
body.dark-mode .data-table th { background: #0f172a; color: #64748b; }
body.dark-mode .data-table td { border-color: rgba(255,255,255,0.06); }
body.dark-mode .data-table tr:hover td { background: #0f172a; }
body.dark-mode .form-control { background: #0f172a; border-color: rgba(255,255,255,0.1); color: #f1f5f9; }
body.dark-mode .course-card { background: #1e293b; }
body.dark-mode .stat-card { background: #1e293b; }
body.dark-mode input, body.dark-mode textarea, body.dark-mode select { background: #0f172a !important; color: #f1f5f9 !important; border-color: rgba(255,255,255,0.1) !important; }
body.dark-mode .upload-zone { background: #0f172a; border-color: rgba(255,255,255,0.1); }
body.dark-mode .content-type-card { background: #1e293b; border-color: rgba(255,255,255,0.08); }
body.dark-mode .content-type-card:hover { background: #1e3a5f; }
body.dark-mode .action-card { background: #1e293b; }
body.dark-mode .nav-item-link { color: #94a3b8; }
body.dark-mode .l-item { color: #94a3b8; }
body.dark-mode .l-item:hover { background: rgba(255,255,255,0.05); color: #f1f5f9; }
body.dark-mode .right-panel { background: #1e293b; }
body.dark-mode .module-nav { background: #1e293b; border-color: rgba(255,255,255,0.06); }
body.dark-mode .lesson-info { background: #1e293b; }
body.dark-mode .action-bar { background: #1e293b; border-color: rgba(255,255,255,0.06); }
body.dark-mode .prev-btn { background: #1e293b; border-color: rgba(255,255,255,0.1); color: #f1f5f9; }

.dark-toggle {
  position: fixed; bottom: 20px; right: 20px;
  width: 42px; height: 42px; border-radius: 50%;
  background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
  color: #f1f5f9; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 999; box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  transition: all .2s;
}
.dark-toggle:hover { transform: scale(1.1); }
body:not(.dark-mode) .dark-toggle { background: #f1f5f9; color: #0f172a; border-color: rgba(0,0,0,0.1); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
</style>
</head>
<body>
{% block content %}{% endblock %}
{% block extra_js %}{% endblock %}
<button class="dark-toggle" onclick="toggleDark()" id="darkToggle" title="Toggle dark mode">🌙</button>

<script>
function toggleDark() {
  const isDark = document.body.classList.toggle('dark-mode');
  localStorage.setItem('glorylms_dark', isDark ? '1' : '0');
  document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
}

// Apply saved preference on load
(function() {
  if (localStorage.getItem('glorylms_dark') === '1') {
    document.body.classList.add('dark-mode');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('darkToggle');
      if (btn) btn.textContent = '☀️';
    });
  }
})();
</script>
</body>
</html>
