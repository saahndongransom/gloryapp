{% extends 'lms/lms_base.html' %}
{% block title %}Password Reset Complete | GloryLMS{% endblock %}
{% block extra_css %}
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin: 20px; }
.icon { font-size: 48px; margin-bottom: 20px; }
h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
a { display: inline-block; background: #1a56db; color: #fff; padding: 11px 24px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 700; }
</style>
{% endblock %}
{% block content %}
<div class="card">
  <div class="icon">✅</div>
  <h2>Password Reset Complete</h2>
  <p>Your password has been set. You can now log in with your new password.</p>
  <a href="{% url 'lms_login' %}">Log In Now</a>
</div>
{% endblock %}
